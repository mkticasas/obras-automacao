<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCasas — Acompanhamento de Obras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1011;
    --bg2: #161719;
    --bg3: #1e2022;
    --border: #2a2c2f;
    --text: #e8e8e8;
    --text2: #9a9a9a;
    --green: #57ac6e;
    --green2: #3d8a52;
    --blue: #4ca8d8;
    --orange: #ed8036;
    --red: #e05252;
    --yellow: #e0c052;
    --radius: 8px;
    --sidebar: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 1000;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 40px; width: 360px;
  }
  .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .login-logo svg { width: 36px; height: 36px; }
  .login-logo span { font-size: 18px; font-weight: 600; color: var(--text); }
  .login-logo small { display: block; font-size: 11px; color: var(--text2); font-weight: 400; }
  .login-box h2 { font-size: 15px; font-weight: 500; margin-bottom: 20px; color: var(--text2); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 10px 12px; font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--green); }
  .btn-primary {
    width: 100%; background: var(--green); color: #fff; border: none; border-radius: var(--radius);
    padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .2s; margin-top: 6px;
  }
  .btn-primary:hover { background: var(--green2); }
  .login-error { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }

  /* APP */
  #app { display: none; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar);
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100;
  }
  .sidebar-logo {
    padding: 18px 16px 14px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo svg { width: 28px; height: 28px; }
  .sidebar-logo span { font-size: 14px; font-weight: 600; line-height: 1.2; }
  .sidebar-logo small { display: block; font-size: 10px; color: var(--text2); font-weight: 400; }
  .sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
    border-radius: var(--radius); color: var(--text2); cursor: pointer;
    transition: background .15s, color .15s; font-size: 13px;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg3); color: var(--green); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
  .user-info {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: var(--radius); cursor: pointer;
  }
  .user-info:hover { background: var(--bg3); }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%; background: var(--green2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .user-name { font-size: 12px; font-weight: 500; }
  .user-role { font-size: 10px; color: var(--text2); }
  .btn-sair {
    width: 100%; margin-top: 4px; background: none; border: 1px solid var(--border);
    color: var(--text2); border-radius: var(--radius); padding: 7px; font-size: 12px;
    cursor: pointer; transition: all .2s;
  }
  .btn-sair:hover { border-color: var(--red); color: var(--red); }

  /* MAIN */
  .main { margin-left: var(--sidebar); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; }
  .btn-action {
    background: var(--green); color: #fff; border: none; border-radius: var(--radius);
    padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-action:hover { background: var(--green2); }
  .btn-action.secondary {
    background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
  }
  .btn-action.secondary:hover { color: var(--text); border-color: var(--text2); }

  /* VIEWS */
  .view { display: none; flex: 1; overflow: hidden; }
  .view.active { display: flex; flex-direction: column; }

  /* KANBAN */
  .kanban-wrap { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 20px 24px; display: flex; gap: 14px; }
  .kanban-col { flex-shrink: 0; width: 240px; display: flex; flex-direction: column; }
  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding: 0 2px;
  }
  .col-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .col-count {
    background: var(--bg3); color: var(--text2); font-size: 11px;
    padding: 2px 7px; border-radius: 20px;
  }
  .col-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 2px; }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-track { background: transparent; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* KANBAN CARD */
  .obra-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; cursor: pointer; transition: border-color .2s, transform .1s;
    position: relative;
  }
  .obra-card:hover { border-color: #3a3c40; transform: translateY(-1px); }
  .obra-card.alerta { border-left: 3px solid var(--orange); }
  .obra-card.revisao-antiga { border-left: 3px solid var(--red); }
  .card-cliente { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .card-endereco { font-size: 11px; color: var(--text2); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-progress { margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }
  .progress-label { font-size: 10px; color: var(--text2); display: flex; justify-content: space-between; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .card-freq { font-size: 10px; color: var(--text2); background: var(--bg3); padding: 2px 7px; border-radius: 20px; }
  .card-alerta-badge { font-size: 10px; color: var(--orange); font-weight: 600; }
  .card-revisao-dias { font-size: 10px; color: var(--red); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    width: 480px; max-height: 90vh; overflow-y: auto; padding: 0;
  }
  .modal-header {
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); padding: 8px 16px; font-size: 13px; cursor: pointer; }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-save { background: var(--green); color: #fff; border: none; border-radius: var(--radius); padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-save:hover { background: var(--green2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field label { font-size: 11px; color: var(--text2); font-weight: 500; }
  .form-field input, .form-field select {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 9px 11px; font-size: 13px; outline: none;
  }
  .form-field input:focus, .form-field select:focus { border-color: var(--green); }
  .form-field select option { background: var(--bg2); }

  /* CARD DETAIL MODAL */
  .modal.modal-lg { width: 600px; }
  .etapa-item { border-bottom: 1px solid var(--border); padding: 12px 0; }
  .etapa-item:last-child { border-bottom: none; }
  .etapa-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 0; }
  .etapa-nome { font-size: 13px; font-weight: 500; }
  .etapa-pct { font-size: 12px; color: var(--text2); }
  .etapa-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin: 8px 0 6px; }
  .etapa-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }
  .etapa-bar-fill.done { background: var(--green); }
  .checklist-items { display: none; padding-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .check-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .check-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .check-label { font-size: 12px; color: var(--text2); cursor: pointer; }
  .check-label.done { text-decoration: line-through; color: #555; }
  .detail-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-mover {
    flex: 1; background: var(--blue); color: #fff; border: none; border-radius: var(--radius);
    padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .btn-mover:hover { opacity: .85; }
  .btn-concluir {
    flex: 1; background: var(--green); color: #fff; border: none; border-radius: var(--radius);
    padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .btn-concluir:hover { background: var(--green2); }
  .btn-danger-sm {
    background: none; border: 1px solid var(--border); color: var(--red);
    border-radius: var(--radius); padding: 9px 14px; font-size: 13px; cursor: pointer;
  }
  .btn-danger-sm:hover { border-color: var(--red); }
  .move-select { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 9px 11px; font-size: 13px; outline: none; }
  .move-select:focus { border-color: var(--blue); }

  /* USUARIOS VIEW */
  .view-inner { flex: 1; overflow-y: auto; padding: 24px; }
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge.gestor { background: rgba(87,172,110,.15); color: var(--green); }
  .badge.tecnico { background: rgba(76,168,216,.15); color: var(--blue); }
  .empty-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 12px; gap: 6px; }
  .empty-col svg { opacity: .2; }
  .empty-col span { font-size: 11px; color: var(--text2); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px;
    font-size: 13px; z-index: 9999; opacity: 0; transform: translateY(10px);
    transition: all .25s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  .loading { color: var(--text2); font-size: 13px; padding: 20px; text-align: center; }
  .col-em-andamento .col-title { color: var(--orange); }
  .col-revisao .col-title { color: var(--yellow); }
  .col-concluido .col-title { color: var(--green); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <path fill="#57ac6e" d="M192.25,382.47c-5.04.57-9.06,4.08-9.08,9.92l-.25,56.03c-.03,6.88,3.15,11.96,10.17,12.11,6.07.13,10.24-4.53,10.17-11.65l-.57-58.03c-.06-5.76-5.62-8.92-10.43-8.38Z"/>

      </svg>
      <div>
        <span>iCasas</span>
        <small>Acompanhamento de Obras</small>
      </div>
    </div>
    <h2>Entrar na sua conta</h2>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="btn-login">Entrar</button>
    <div class="login-error" id="login-error">E-mail ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="width:28px;height:28px">
        <path fill="#57ac6e" d="M192.25,382.47c-5.04.57-9.06,4.08-9.08,9.92l-.25,56.03c-.03,6.88,3.15,11.96,10.17,12.11,6.07.13,10.24-4.53,10.17-11.65l-.57-58.03c-.06-5.76-5.62-8.92-10.43-8.38Z"/>
        <path fill="#4ca8d8" d="M221.91,382.55c-5.22.95-8.41,4.82-8.39,10.72l.14,58.64c.01,5.9,6.35,9.12,11.21,8.56,5.69-.65,8.89-5.2,8.82-11.66l-.6-58.07c-.06-6.13-6.29-9.08-11.18-8.19Z"/>

      </svg>
      <div>
        <span>iCasas</span>
        <small>Obras</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-view="kanban">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/></svg>
        Kanban
      </div>
      <div class="nav-item" data-view="usuarios" id="nav-usuarios" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Usuários
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div>
          <div class="user-name" id="sidebar-nome">—</div>
          <div class="user-role" id="sidebar-perfil">—</div>
        </div>
      </div>
      <button class="btn-sair" id="btn-sair">Sair da conta</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <h1 id="topbar-title">Kanban de Obras</h1>
      <div class="topbar-actions">
        <button class="btn-action" id="btn-nova-obra" style="display:none">

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://mqdhavyaeujufhlqdlfg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZGhhdnlhZXVqdWZobHFkbGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDg0OTUsImV4cCI6MjA5NTUyNDQ5NX0.bmlsVIXzQ1H-R4CEVZJzg_8TXygBsSQ57GOteBKqLHE';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentPerfil = null;
let obraAtualId = null;
let obras = [];

const COLUNAS = [
  { key: 'em_andamento', label: 'Em andamento', cls: 'col-em-andamento' },
  { key: 'seg',          label: 'Segunda-feira', cls: '' },
  { key: 'ter',          label: 'Terça-feira',   cls: '' },
  { key: 'qua',          label: 'Quarta-feira',  cls: '' },
  { key: 'qui',          label: 'Quinta-feira',  cls: '' },
  { key: 'sex',          label: 'Sexta-feira',   cls: '' },
  { key: 'revisao',      label: 'Revisão',       cls: 'col-revisao' },
  { key: 'concluido',    label: 'Concluído',     cls: 'col-concluido' },
];

// AUTH
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  const { error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) { err.style.display = 'block'; return; }
});

document.getElementById('login-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    currentUser = session.user;
    await loadPerfil();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

async function loadPerfil() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (!data) return;
  currentPerfil = data.perfil;
  document.getElementById('sidebar-nome').textContent = data.nome;
  document.getElementById('sidebar-perfil').textContent = data.perfil === 'gestor' ? 'Gestor' : 'Técnico';
  document.getElementById('sidebar-avatar').textContent = data.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
  if (data.perfil === 'gestor') {
    document.getElementById('nav-usuarios').style.display = 'flex';
    document.getElementById('btn-nova-obra').style.display = 'flex';
  }
}

document.getElementById('btn-sair').addEventListener('click', () => sb.auth.signOut());

// NAVEGAÇÃO
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const view = item.dataset.view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.getElementById('topbar-title').textContent = view === 'kanban' ? 'Kanban de Obras' : 'Usuários';
    document.getElementById('btn-nova-obra').style.display = (view === 'kanban' && currentPerfil === 'gestor') ? 'flex' : 'none';
    if (view === 'usuarios') loadUsuarios();
    if (view === 'kanban') renderKanban();
  });
});

function initApp() { renderKanban(); }

// KANBAN
async function renderKanban() {
  const board = document.getElementById('kanban-board');
  board.innerHTML = '<div class="loading">Carregando obras...</div>';

  const { data: obras_data } = await sb.from('acomp_obras').select('*').order('criado_em');
  if (!obras_data) { board.innerHTML = '<div class="loading">Erro ao carregar.</div>'; return; }
  obras = obras_data;

  const progressos = await loadProgressosGeral(obras_data.map(o => o.id));
  const alertas_data = await loadAlertas(obras_data.map(o => o.id));

  board.innerHTML = '';
  COLUNAS.forEach(col => {
    const cards = obras_data.filter(o => o.status_coluna === col.key);
    const colEl = document.createElement('div');
    colEl.className = 'kanban-col ' + col.cls;
    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-body" id="col-${col.key}"></div>
    `;
    board.appendChild(colEl);

    const body = colEl.querySelector('.col-body');
    if (cards.length === 0) {
      body.innerHTML = `<div class="empty-col">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        <span>Nenhuma obra</span>
      </div>`;
      return;
    }
    cards.forEach(obra => {
      const pct = progressos[obra.id] || 0;
      const temAlerta = alertas_data.includes(obra.id);
      const diasRevisao = obra.revisao_desde ? Math.floor((Date.now() - new Date(obra.revisao_desde)) / 86400000) : 0;
      const cardEl = document.createElement('div');
      cardEl.className = 'obra-card' + (temAlerta ? ' alerta' : '') + (diasRevisao >= 3 && col.key === 'revisao' ? ' revisao-antiga' : '');
      cardEl.innerHTML = `
        <div class="card-cliente">${obra.cliente}</div>
        <div class="card-endereco">${obra.endereco || 'Endereço não informado'}</div>
        <div class="card-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-label"><span>Progresso geral</span><span>${pct}%</span></div>
        </div>
        <div class="card-meta">
          <span class="card-freq">${obra.frequencia_visita}</span>
          ${temAlerta ? '<span class="card-alerta-badge">⚠ Comprar equip.</span>' : ''}
          ${diasRevisao >= 3 && col.key === 'revisao' ? `<span class="card-revisao-dias">${diasRevisao}d em revisão</span>` : ''}
        </div>
      `;
      cardEl.addEventListener('click', () => openDetalhe(obra));
      body.appendChild(cardEl);
    });
  });
}

async function loadProgressosGeral(ids) {
  if (!ids.length) return {};
  const { data } = await sb.from('acomp_progresso_geral_obra').select('*').in('obra_id', ids);
  const map = {};
  (data || []).forEach(r => map[r.obra_id] = parseInt(r.pct_geral || 0));
  return map;
}

async function loadAlertas(ids) {
  if (!ids.length) return [];
  const { data } = await sb.from('acomp_alertas').select('obra_id').in('obra_id', ids).eq('status', 'pendente');
  return (data || []).map(r => r.obra_id);
}

// DETALHE
async function openDetalhe(obra) {
  obraAtualId = obra.id;
  document.getElementById('detalhe-cliente').textContent = obra.cliente;
  document.getElementById('detalhe-endereco').textContent = obra.endereco || '—';
  document.getElementById('detalhe-mover-sel').value = obra.status_coluna === 'concluido' ? 'em_andamento' : obra.status_coluna;

  const etapasEl = document.getElementById('detalhe-etapas');
  etapasEl.innerHTML = '<div class="loading">Carregando checklist...</div>';
  openModal('modal-detalhe');

  const { data: etapas } = await sb.from('acomp_etapas_template').select('*').order('ordem');
  const { data: checklist } = await sb.from('acomp_obra_checklist')
    .select('*, acomp_checklist_template(item, ordem, etapa_id)')
    .eq('obra_id', obra.id);

  etapasEl.innerHTML = '';
  (etapas || []).forEach(etapa => {
    const items = (checklist || []).filter(c => c.acomp_checklist_template?.etapa_id === etapa.id)
      .sort((a,b) => a.acomp_checklist_template.ordem - b.acomp_checklist_template.ordem);
    const total = items.length;
    const done = items.filter(i => i.concluido).length;
    const pct = total ? Math.round((done/total)*100) : 0;

    const etapaEl = document.createElement('div');
    etapaEl.className = 'etapa-item';
    etapaEl.innerHTML = `
      <div class="etapa-header">
        <span class="etapa-nome">${etapa.numero}. ${etapa.nome}</span>
        <span class="etapa-pct">${done}/${total} — ${pct}%</span>
      </div>
      <div class="etapa-bar"><div class="etapa-bar-fill ${pct===100?'done':''}" style="width:${pct}%"></div></div>
      <div class="checklist-items" id="cl-${etapa.id}"></div>
    `;
    const clEl = etapaEl.querySelector('.checklist-items');
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'check-row';
      row.innerHTML = `
        <input type="checkbox" id="ck-${item.id}" ${item.concluido ? 'checked' : ''}>
        <label class="check-label ${item.concluido?'done':''}" for="ck-${item.id}">${item.acomp_checklist_template.item}</label>
      `;
      const cb = row.querySelector('input');
      cb.addEventListener('change', async () => {
        const lbl = row.querySelector('.check-label');
        const val = cb.checked;
        await sb.from('acomp_obra_checklist').update({ concluido: val, concluido_em: val ? new Date().toISOString() : null }).eq('id', item.id);
        lbl.classList.toggle('done', val);
        toast(val ? 'Item marcado ✓' : 'Item desmarcado', 'success');
      });
      clEl.appendChild(row);
    });
    etapaEl.querySelector('.etapa-header').addEventListener('click', () => {
      clEl.style.display = clEl.style.display === 'none' ? 'flex' : 'none';
    });
    etapasEl.appendChild(etapaEl);
  });
}

document.getElementById('btn-mover-obra').addEventListener('click', async () => {
  const novoStatus = document.getElementById('detalhe-mover-sel').value;
  await sb.from('acomp_obras').update({ status_coluna: novoStatus }).eq('id', obraAtualId);
  closeModal('modal-detalhe');
  toast('Obra movida com sucesso', 'success');
  renderKanban();
});

document.getElementById('btn-concluir-obra').addEventListener('click', async () => {
  if (!confirm('Marcar esta obra como concluída?')) return;
  await sb.from('acomp_obras').update({ status_coluna: 'concluido' }).eq('id', obraAtualId);
  closeModal('modal-detalhe');
  toast('Obra concluída!', 'success');
  renderKanban();
});

// NOVA OBRA
document.getElementById('btn-nova-obra').addEventListener('click', () => openModal('modal-obra'));

document.getElementById('btn-salvar-obra').addEventListener('click', async () => {
  const cliente = document.getElementById('obra-cliente').value.trim();
  if (!cliente) { toast('Informe o nome da obra', 'error'); return; }
  const { data, error } = await sb.from('acomp_obras').insert({
    cliente,
    endereco: document.getElementById('obra-endereco').value.trim(),
    contato_whatsapp: document.getElementById('obra-whatsapp').value.trim(),
    responsavel_comercial: document.getElementById('obra-comercial').value.trim(),
    frequencia_visita: document.getElementById('obra-frequencia').value,
    data_prevista_gesso: document.getElementById('obra-gesso').value || null,
  }).select().single();
  if (error) { toast('Erro ao salvar obra', 'error'); return; }
  await sb.rpc('acomp_gerar_checklist_obra', { p_obra_id: data.id });
  closeModal('modal-obra');
  toast('Obra criada com sucesso', 'success');
  document.getElementById('obra-cliente').value = '';
  document.getElementById('obra-endereco').value = '';
  document.getElementById('obra-whatsapp').value = '';
  document.getElementById('obra-comercial').value = '';
  document.getElementById('obra-gesso').value = '';
  renderKanban();
});

// USUARIOS
async function loadUsuarios() {
  const { data } = await sb.from('profiles').select('*').order('criado_em');
  const tbody = document.getElementById('usuarios-tbody');
  if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text2);text-align:center;padding:20px">Nenhum usuário cadastrado</td></tr>'; return; }
  tbody.innerHTML = data.map(u => `
    <tr>
      <td>${u.nome}</td>
      <td style="color:var(--text2)">${u.id.substring(0,8)}...</td>
      <td><span class="badge ${u.perfil}">${u.perfil}</span></td>
      <td><span style="color:var(--text2);font-size:12px">${new Date(u.criado_em).toLocaleDateString('pt-BR')}</span></td>
    </tr>
  `).join('');
}

// Botão adicionar usuário — aparece só pra gestor
document.getElementById('topbar-title').insertAdjacentHTML('afterend', '');
document.getElementById('btn-nova-obra').addEventListener('click', () => {});

document.getElementById('view-usuarios').querySelector('.view-inner').insertAdjacentHTML('beforebegin', '');

async function setupUsuarioBtn() {
  const topbarActions = document.querySelector('.topbar-actions');
  const btnUser = document.createElement('button');
  btnUser.className = 'btn-action';
  btnUser.id = 'btn-novo-usuario';
  btnUser.style.display = 'none';
  btnUser.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Novo Usuário`;
  topbarActions.prepend(btnUser);
  btnUser.addEventListener('click', () => openModal('modal-usuario'));
}
setupUsuarioBtn();

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const view = item.dataset.view;
    const btnUser = document.getElementById('btn-novo-usuario');
    if (btnUser) btnUser.style.display = (view === 'usuarios' && currentPerfil === 'gestor') ? 'flex' : 'none';
  });
});

document.getElementById('btn-salvar-usuario').addEventListener('click', async () => {
  const nome = document.getElementById('user-nome').value.trim();
  const email = document.getElementById('user-email').value.trim();
  const senha = document.getElementById('user-senha').value;
  const perfil = document.getElementById('user-perfil').value;
  if (!nome || !email || !senha) { toast('Preencha todos os campos obrigatórios', 'error'); return; }
  if (senha.length < 6) { toast('Senha deve ter no mínimo 6 caracteres', 'error'); return; }

  const { data, error } = await sb.auth.admin ? 
    sb.auth.admin.createUser({ email, password: senha, email_confirm: true }) :
    sb.auth.signUp({ email, password: senha });

  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  const uid = data.user?.id;
  if (uid) {
    await sb.from('profiles').insert({ id: uid, nome, perfil });
  }
  closeModal('modal-usuario');
  toast('Usuário criado com sucesso', 'success');
  document.getElementById('user-nome').value = '';
  document.getElementById('user-email').value = '';
  document.getElementById('user-senha').value = '';
  loadUsuarios();
});

// HELPERS
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => el.className = '', 2800);
}
</script>
