<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCasas — Acompanhamento de Obras</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1011;--bg2:#161719;--bg3:#1e2022;--bg4:#252729;
  --border:#2a2c2f;--border2:#353739;
  --text:#e8e8e8;--text2:#9a9a9a;--text3:#5a5c5f;
  --green:#57ac6e;--green2:#3d8a52;
  --blue:#4ca8d8;--blue2:#3388b8;
  --orange:#ed8036;--red:#e05252;--yellow:#e0c052;
  --sidebar:220px;--topbar:54px;--radius:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100vh;overflow:hidden}

/* LOGIN */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:40px;width:360px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo svg{width:38px;height:38px}
.login-logo-txt span{display:block;font-size:17px;font-weight:700}
.login-logo-txt small{font-size:11px;color:var(--text2)}
.lbl{display:block;font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:14px;outline:none;margin-bottom:13px;transition:border-color .2s}
.inp:focus{border-color:var(--green)}
.btn-login{width:100%;background:var(--green2);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-login:hover{background:var(--green)}
.login-err{color:var(--red);font-size:12px;margin-top:9px;display:none}

/* APP */
#app{display:none;height:100vh}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200}
.sb-logo{padding:16px 14px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.sb-logo svg{width:30px;height:30px;flex-shrink:0}
.sb-logo-txt span{font-size:14px;font-weight:700;display:block}
.sb-logo-txt small{font-size:10px;color:var(--text2)}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:13px;transition:background .15s,color .15s}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--green)}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;margin-bottom:4px}
.sb-user:hover{background:var(--bg3)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-nome{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-perfil{font-size:10px;color:var(--text2)}
.btn-sair{width:100%;background:none;border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:7px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-sair:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{margin-left:var(--sidebar);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar);display:flex;align-items:center;padding:0 18px;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.topbar-title{font-size:15px;font-weight:600;flex-shrink:0}
.topbar-search{flex:1;max-width:260px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:0 10px;gap:7px;height:32px}
.topbar-search svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
.topbar-search input{background:none;border:none;color:var(--text);font-size:13px;outline:none;width:100%}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-space{flex:1}
.btn-top{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;white-space:nowrap}
.btn-top.primary{background:var(--green2);color:#fff}
.btn-top.primary:hover{background:var(--green)}
.btn-top.ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-top.ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-top svg{width:14px;height:14px}

/* SINO */
.bell-wrap{position:relative}
.bell-btn{width:34px;height:34px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:border-color .2s}
.bell-btn:hover{border-color:var(--border2)}
.bell-btn svg{width:17px;height:17px;color:var(--text2)}
.bell-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:20px;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg2)}
.bell-panel{position:absolute;right:0;top:40px;width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:300;display:none;max-height:400px;overflow:hidden;flex-direction:column}
.bell-panel.open{display:flex}
.bell-panel-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bell-panel-head span{font-size:13px;font-weight:600}
.btn-marcar-lidas{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer}
.bell-list{overflow-y:auto;flex:1}
.bell-item{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.bell-item:last-child{border-bottom:none}
.bell-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.bell-dot.pendente{background:var(--orange)}
.bell-dot.lida{background:var(--text3)}
.bell-item-content{flex:1;min-width:0}
.bell-item-title{font-size:12px;font-weight:500;margin-bottom:2px}
.bell-item-sub{font-size:11px;color:var(--text2)}
.bell-empty{padding:24px;text-align:center;color:var(--text2);font-size:13px}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}

/* BOARD */
#board{flex:1;display:flex;gap:11px;overflow-x:auto;overflow-y:hidden;padding:16px 18px}
#board::-webkit-scrollbar{height:5px}
#board::-webkit-scrollbar-track{background:transparent}
#board::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* COLUNAS */
.col{flex-shrink:0;width:230px;display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:100%}
.col-head{padding:10px 12px 9px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.col-head-l{display:flex;align-items:center;gap:7px}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.col-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 7px;border-radius:20px}
.cards-wrap{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;min-height:0}
.cards-wrap::-webkit-scrollbar{width:3px}
.cards-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* CARD */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .18s,transform .1s;position:relative}
.card:hover:not(.inacessivel){border-color:var(--border2);transform:translateY(-1px)}
.card.tem-alerta{border-left:3px solid var(--orange)}
.card.inacessivel{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
.card.minha-obra{border-width:2px}
.card-strip{height:4px}
.card-body{padding:9px 10px 10px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px}
.card-cliente{font-size:13px;font-weight:600;line-height:1.3;flex:1}
.card-icons{display:flex;align-items:center;gap:4px;flex-shrink:0}
.card-notif-icon svg{width:14px;height:14px;color:var(--orange)}
.card-lock-icon svg{width:13px;height:13px;color:var(--text3)}
.card-end{font-size:11px;color:var(--text2);margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.card-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.card-bar-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--text3)}
.card-footer{display:flex;align-items:center;gap:5px;margin-top:9px;flex-wrap:wrap}
.card-freq{font-size:10px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:20px}
.card-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.card-badge.compra{background:rgba(237,128,54,.13);color:var(--orange)}
.card-badge.revisao{background:rgba(224,82,82,.13);color:var(--red)}
.card-atrib-dots{display:flex;gap:3px;align-items:center;margin-top:7px}
.card-atrib-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.card-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 12px;gap:5px}
.card-empty svg{opacity:.2;width:22px;height:22px}
.card-empty span{font-size:11px;color:var(--text2)}

/* DRAG & DROP */
.card[draggable=true]{cursor:grab}
.card[draggable=true].inacessivel{cursor:not-allowed}
.card.dragging{opacity:.4;transform:rotate(1deg)}
.cards-wrap.drag-over{background:rgba(76,168,216,.06);border-radius:8px;outline:2px dashed var(--blue);outline-offset:-4px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:90vh}
.modal.sm{width:420px}
.modal.md{width:500px}
.modal.lg{width:600px}
.modal-head{padding:16px 18px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-size:15px;font-weight:600}
.modal-head p{font-size:11px;color:var(--text2);margin-top:2px}
.m-x{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1}
.m-x:hover{color:var(--text)}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.flabel{display:block;font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px}
.finput,.fselect{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:9px 11px;font-size:13px;outline:none;transition:border-color .2s}
.finput:focus,.fselect:focus{border-color:var(--blue)}
.fselect option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:8px 16px;font-size:13px;cursor:pointer}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-save{background:var(--green2);color:#fff;border:none;border-radius:var(--radius);padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer}
.btn-save:hover{background:var(--green)}
.btn-danger{background:none;border:1px solid var(--border);color:var(--red);border-radius:var(--radius);padding:8px 14px;font-size:13px;cursor:pointer}
.btn-danger:hover{border-color:var(--red)}

/* COLOR PICKER */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s}
.color-opt:hover{transform:scale(1.15)}
.color-opt.selected{border-color:#fff}

/* DETALHE */
.detalhe-section{margin-bottom:4px}
.detalhe-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:10px}
.etapa-bloco{border-bottom:1px solid var(--border);padding:11px 0}
.etapa-bloco:last-child{border-bottom:none}
.etapa-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.etapa-nome{font-size:13px;font-weight:500}
.etapa-right{display:flex;align-items:center;gap:8px}
.etapa-pct{font-size:11px;color:var(--text2)}
.etapa-chev{color:var(--text3);transition:transform .2s;font-size:13px}
.etapa-chev.aberto{transform:rotate(180deg)}
.etapa-lock{display:flex;align-items:center;gap:5px;font-size:11px;padding:2px 8px;border-radius:20px}
.etapa-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:7px 0 0}
.etapa-bar-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .3s}
.etapa-bar-fill.ok{background:var(--green)}
.checklist{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.checklist.fechado{display:none}
.ck-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.ck-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0}
.ck-row input[type=checkbox]:disabled{cursor:not-allowed;opacity:.4}
.ck-lbl{font-size:12px;color:var(--text2);cursor:pointer;line-height:1.4}
.ck-lbl.feito{text-decoration:line-through;color:var(--text3)}

/* ATRIBUIÇÕES */
.atrib-list{display:flex;flex-direction:column;gap:6px}
.atrib-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)}
.atrib-left{display:flex;align-items:center;gap:8px}
.atrib-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.atrib-nome{font-size:13px}
.btn-rm-atrib{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 2px}
.btn-rm-atrib:hover{color:var(--red)}
.atrib-add-row{display:flex;gap:8px;margin-top:4px}
.atrib-sel{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 11px;font-size:13px;outline:none}

/* HISTÓRICO */
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
.hist-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hist-content{flex:1;min-width:0}
.hist-acao{font-size:12px;font-weight:500}
.hist-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* MOVER */
.mover-sec{border-top:1px solid var(--border);padding-top:13px;margin-top:4px}
.mover-title{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.mover-row{display:flex;gap:7px}
.m-sel{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 11px;font-size:13px;outline:none}
.btn-mover{background:var(--blue2);color:#fff;border:none;border-radius:var(--radius);padding:8px 15px;font-size:13px;font-weight:500;cursor:pointer}
.btn-concluir{background:var(--green2);color:#fff;border:none;border-radius:var(--radius);padding:8px 15px;font-size:13px;font-weight:500;cursor:pointer}

/* USUÁRIOS */
.view-inner{flex:1;overflow-y:auto;padding:18px}
.tbl-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge.gestor{background:rgba(87,172,110,.13);color:var(--green)}
.badge.tecnico{background:rgba(76,168,216,.13);color:var(--blue)}
.perfil-cor-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 15px;font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
.loading-txt{color:var(--text2);font-size:13px;padding:20px;text-align:center}
</style>
</head>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">

<script>
const SB_URL='https://mqdhavyaeujufhlqdlfg.supabase.co';

const CORES=['#4ca8d8','#57ac6e','#ed8036','#9b7ee8','#e05252','#4db8a0','#e0c052','#e07a8a'];
const COLS=[
  {key:'em_andamento',label:'Em andamento',dot:'#ed8036'},
  {key:'seg',label:'Segunda',dot:'#4ca8d8'},{key:'ter',label:'Terça',dot:'#4ca8d8'},
  {key:'qua',label:'Quarta',dot:'#4ca8d8'},{key:'qui',label:'Quinta',dot:'#4ca8d8'},
  {key:'sex',label:'Sexta',dot:'#4ca8d8'},{key:'revisao',label:'Revisão',dot:'#e0c052'},
  {key:'concluido',label:'Concluído',dot:'#57ac6e'},
];
const{createClient}=supabase;
const sb=createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
window.sb=sb;
window.sb=sb;

let ME=null,PERFIL=null,ME_COR='#4ca8d8',OBRA_ID=null,OBRA_ATUAL=null,SEARCH='',ALERTAS_DATA=[];
let dragObraId=null;

// COLOR PICKER
function renderColorPicker(containerId,hiddenId,selected){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  CORES.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-opt'+(c===selected?' selected':'');
    d.style.background=c;
    d.title=c;
    d.addEventListener('click',()=>{
      el.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('selected'));
      d.classList.add('selected');
      document.getElementById(hiddenId).value=c;
    });
    el.appendChild(d);
  });
}

// AUTH
function withTimeout(p,ms){return Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]);}

async function iniciarApp(session){
  ME=session.user;
  try{await loadMe();}catch(e){console.error('loadMe:',e);}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.querySelector('.main').style.display='flex';
  renderBoard();
  loadNotificacoes();
}

(async()=>{
  try{
    const{data:{session},error}=await sb.auth.getSession();
    if(error)console.error('getSession:',error);
    if(session)await iniciarApp(session);
  }catch(e){console.error('getSession ex:',e);}
})();

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='TOKEN_REFRESHED')return;
  if(event==='SIGNED_OUT'){ME=null;PERFIL=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
});

document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('l-senha').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const btn=document.getElementById('btn-login');
  const email=document.getElementById('l-email').value.trim();
  const senha=document.getElementById('l-senha').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';err.style.display='block';return;}
  btn.textContent='Entrando...';btn.disabled=true;
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
    if(error){
      const msgs={'Invalid login credentials':'E-mail ou senha incorretos.'};
      err.textContent=msgs[error.message]||error.message;
      err.style.display='block';
    } else if(data?.session){
      await iniciarApp(data.session);
    }
  }catch(e){
    console.error('Login ex:',e);
    err.textContent='Erro: '+e.message;
    err.style.display='block';
  }finally{
    btn.textContent='Entrar';btn.disabled=false;
  }
}

async function loadMe(){
  const{data,error}=await sb.from('profiles').select('*').eq('id',ME.id).single();
  if(error)console.error('profiles:',error);
  if(!data)return;
  PERFIL=data.perfil;ME_COR=data.cor||'#4ca8d8';
  const ini=data.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('sb-avatar').textContent=ini;
  document.getElementById('sb-avatar').style.background=ME_COR;
  document.getElementById('sb-nome').textContent=data.nome;
  document.getElementById('sb-perfil').textContent=data.perfil==='gestor'?'Gestor':'Técnico';
  if(data.perfil==='gestor'){
    document.getElementById('btn-nova-obra').style.display='flex';
    document.getElementById('nav-usuarios').style.display='flex';
    document.getElementById('btn-novo-usuario').style.display='flex';
  }
}
document.getElementById('btn-sair').addEventListener('click',()=>sb.auth.signOut());

// NAV
document.querySelectorAll('.nav-item[data-view]').forEach(item=>{
  item.addEventListener('click',()=>{
    const v=item.dataset.view;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.view').forEach(vw=>vw.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.getElementById('topbar-title').textContent=v==='kanban'?'Kanban de Obras':'Usuários';
    document.getElementById('btn-nova-obra').style.display=(v==='kanban'&&PERFIL==='gestor')?'flex':'none';
    if(v==='usuarios')loadUsuarios();
  });
});

document.getElementById('search-inp').addEventListener('input',e=>{
  SEARCH=e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  renderBoard();
});

// NOTIFICAÇÕES
async function loadNotificacoes(){
  const{data}=await sb.from('acomp_alertas').select('*,acomp_obras(cliente)').order('data_disparo',{ascending:false}).limit(50);
  ALERTAS_DATA=data||[];renderSino();
}
function renderSino(){
  const pendentes=ALERTAS_DATA.filter(a=>a.status==='pendente');
  const badge=document.getElementById('bell-badge');
  const list=document.getElementById('bell-list');
  badge.style.display=pendentes.length?'flex':'none';
  if(pendentes.length)badge.textContent=pendentes.length>9?'9+':pendentes.length;
  if(!ALERTAS_DATA.length){list.innerHTML='<div class="bell-empty">Nenhuma notificação</div>';return;}
  list.innerHTML=ALERTAS_DATA.slice(0,20).map(a=>{
    const obra=a.acomp_obras?.cliente||'—';
    const lida=a.status!=='pendente';
    const titulo=a.tipo==='compra_equipamento'?'Compra de equipamentos':'Revisão pendente';
    const dt=new Date(a.data_disparo).toLocaleDateString('pt-BR');
    return `<div class="bell-item"><div class="bell-dot ${lida?'lida':'pendente'}"></div>
      <div class="bell-item-content"><div class="bell-item-title">${titulo}</div>
      <div class="bell-item-sub">${obra}</div><div class="bell-item-sub" style="color:var(--text3)">${dt}</div></div>
      ${!lida?`<button onclick="marcarLida('${a.id}')" style="background:none;border:1px solid var(--border);color:var(--text3);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;flex-shrink:0">Lida</button>`:''}
    </div>`;
  }).join('');
}
async function marcarLida(id){
  await sb.from('acomp_alertas').update({status:'enviado'}).eq('id',id);
  ALERTAS_DATA=ALERTAS_DATA.map(a=>a.id===id?{...a,status:'enviado'}:a);
  renderSino();toast('Notificação lida','ok');
}
document.getElementById('btn-marcar-lidas').addEventListener('click',async()=>{
  const ids=ALERTAS_DATA.filter(a=>a.status==='pendente').map(a=>a.id);
  if(!ids.length)return;
  await sb.from('acomp_alertas').update({status:'enviado'}).in('id',ids);
  ALERTAS_DATA=ALERTAS_DATA.map(a=>({...a,status:'enviado'}));
  renderSino();toast('Todas lidas','ok');
});
document.getElementById('bell-btn').addEventListener('click',e=>{e.stopPropagation();document.getElementById('bell-panel').classList.toggle('open');});
document.addEventListener('click',e=>{if(!document.getElementById('bell-wrap').contains(e.target))document.getElementById('bell-panel').classList.remove('open');});

// DRAG & DROP
function setupDrag(card,obraId,acessivel){
  if(!acessivel)return;
  card.draggable=true;
  card.addEventListener('dragstart',e=>{dragObraId=obraId;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.cards-wrap').forEach(w=>w.classList.remove('drag-over'));});
}
function setupDrop(wrap,colKey){
  wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.classList.add('drag-over');});
  wrap.addEventListener('dragleave',e=>{if(!wrap.contains(e.relatedTarget))wrap.classList.remove('drag-over');});
  wrap.addEventListener('drop',async e=>{
    e.preventDefault();wrap.classList.remove('drag-over');
    if(!dragObraId)return;
    await sb.from('acomp_obras').update({status_coluna:colKey}).eq('id',dragObraId);
    dragObraId=null;renderBoard();
  });
}

// BOARD
async function renderBoard(){
  const board=document.getElementById('board');
  const[{data:obras},{data:prog},{data:atribs}]=await Promise.all([
    sb.from('acomp_obras').select('*').order('criado_em'),
    sb.from('acomp_progresso_geral_obra').select('*'),
    sb.from('obra_atribuicoes').select('obra_id,profile_id,profiles(nome,cor)'),
  ]);
  const alertSet=new Set(ALERTAS_DATA.filter(a=>a.status==='pendente').map(a=>a.obra_id));
  const progMap={};(prog||[]).forEach(r=>progMap[r.obra_id]=parseInt(r.pct_geral||0));

  // mapa de atribuições por obra
  const atribMap={};
  (atribs||[]).forEach(a=>{
    if(!atribMap[a.obra_id])atribMap[a.obra_id]=[];
    atribMap[a.obra_id].push({profile_id:a.profile_id,nome:a.profiles?.nome,cor:a.profiles?.cor||'#4ca8d8'});
  });

  const filtered=(obras||[]).filter(o=>{
    if(!SEARCH)return true;
    const txt=(o.cliente+' '+(o.endereco||'')).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return txt.includes(SEARCH);
  });

  board.innerHTML='';
  COLS.forEach(col=>{
    const cards=filtered.filter(o=>o.status_coluna===col.key);
    const colEl=document.createElement('div');colEl.className='col';
    colEl.innerHTML=`<div class="col-head"><div class="col-head-l"><div class="col-dot" style="background:${col.dot}"></div><span class="col-name">${col.label}</span></div><span class="col-count">${cards.length}</span></div><div class="cards-wrap"></div>`;
    board.appendChild(colEl);
    const wrap=colEl.querySelector('.cards-wrap');
    setupDrop(wrap,col.key);

    if(!cards.length){wrap.innerHTML=`<div class="card-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><span>Vazio</span></div>`;return;}

    cards.forEach((obra,oi)=>{
      const pct=progMap[obra.id]||0;
      const temAlerta=alertSet.has(obra.id);
      const barColor=pct===100?'var(--green)':pct>=50?'var(--blue)':'var(--orange)';
      const diasRev=obra.revisao_desde?Math.floor((Date.now()-new Date(obra.revisao_desde))/86400000):0;
      const atribuicoes=atribMap[obra.id]||[];
      const temAtrib=atribuicoes.length>0;

      // acessibilidade: gestor vê tudo; técnico só vê se atribuído ou se obra sem atribuição
      const euAtribuido=atribuicoes.some(a=>a.profile_id===ME?.id);
      const acessivel=PERFIL==='gestor'||!temAtrib||euAtribuido;
      const minhaObra=euAtribuido||(PERFIL==='gestor');

      // cor da faixa: minha cor se minha obra, senão cor neutra
      const stripColor=euAtribuido?ME_COR:(PERFIL==='gestor'&&temAtrib?atribuicoes[0].cor:'#2a2c2f');

      const card=document.createElement('div');
      card.className='card'+(temAlerta&&acessivel?' tem-alerta':'')+(!acessivel?' inacessivel':'')+(minhaObra&&acessivel?' minha-obra':'');
      card.dataset.id=obra.id;
      if(minhaObra&&acessivel)card.style.borderColor=stripColor+'66';

      const dotsHTML=atribuicoes.slice(0,5).map(a=>`<div class="card-atrib-dot" style="background:${a.cor}" title="${a.nome||''}"></div>`).join('');

      card.innerHTML=`
        <div class="card-strip" style="background:${stripColor}"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-cliente">${obra.cliente}</div>
            <div class="card-icons">
              ${temAlerta&&acessivel?'<div class="card-notif-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>':''}
              ${!acessivel?'<div class="card-lock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>':''}
            </div>
          </div>
          <div class="card-end">${obra.endereco||'Endereço não informado'}</div>
          <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <div class="card-bar-labels"><span>Progresso</span><span>${pct}%</span></div>
          ${dotsHTML?`<div class="card-atrib-dots">${dotsHTML}</div>`:''}
          <div class="card-footer">
            <span class="card-freq">${obra.frequencia_visita}</span>
            ${temAlerta&&acessivel?'<span class="card-badge compra">⚠ Comprar equip.</span>':''}
            ${diasRev>=3&&col.key==='revisao'?`<span class="card-badge revisao">${diasRev}d em revisão</span>`:''}
          </div>
        </div>`;

      if(acessivel){
        card.addEventListener('click',()=>openDetalhe(obra,atribuicoes));
        setupDrag(card,obra.id,true);
      }
      wrap.appendChild(card);
    });
  });
}

async function atualizarBarraCard(obraId){
  const{data}=await sb.from('acomp_progresso_geral_obra').select('pct_geral').eq('obra_id',obraId).single();
  const pct=parseInt(data?.pct_geral||0);
  const barColor=pct===100?'var(--green)':pct>=50?'var(--blue)':'var(--orange)';
  const card=document.querySelector(`.card[data-id="${obraId}"]`);
  if(!card)return;
  const fill=card.querySelector('.card-bar-fill');
  const label=card.querySelector('.card-bar-labels span:last-child');
  if(fill){fill.style.width=pct+'%';fill.style.background=barColor;}
  if(label)label.textContent=pct+'%';
}

// DETALHE
async function openDetalhe(obra,atribuicoes){
  OBRA_ID=obra.id;OBRA_ATUAL=obra;
  document.getElementById('d-cliente').textContent=obra.cliente;
  document.getElementById('d-end').textContent=obra.endereco||'—';
  const body=document.getElementById('d-body');
  body.innerHTML='<div class="loading-txt">Carregando...</div>';
  openOv('ov-detalhe');

  const[{data:etapas},{data:cl},{data:bloqueios},{data:historico},{data:todosProfiles}]=await Promise.all([
    sb.from('acomp_etapas_template').select('*').order('ordem'),
    sb.from('acomp_obra_checklist').select('id,concluido,concluido_em,acomp_checklist_template(id,item,ordem,etapa_id)').eq('obra_id',obra.id),
    sb.from('etapa_bloqueios').select('*').eq('obra_id',obra.id),
    sb.from('checklist_historico').select('*').eq('obra_id',obra.id).order('criado_em',{ascending:false}).limit(30),
    sb.from('profiles').select('id,nome,cor,perfil'),
  ]);

  const bloqMap={};(bloqueios||[]).forEach(b=>bloqMap[b.etapa_id]={profile_id:b.profile_id,nome:b.profile_nome,cor:b.profile_cor});

  body.innerHTML='';

  // SEÇÃO: ATRIBUIÇÕES (só gestor)
  if(PERFIL==='gestor'){
    const sec=document.createElement('div');sec.className='detalhe-section';
    sec.innerHTML=`<div class="detalhe-section-title">Perfis atribuídos</div>`;
    const atribList=document.createElement('div');atribList.className='atrib-list';atribList.id='atrib-list-'+obra.id;

    function renderAtribList(lista){
      atribList.innerHTML='';
      if(!lista.length){atribList.innerHTML='<span style="font-size:12px;color:var(--text3)">Nenhum perfil atribuído — todos têm acesso.</span>';return;}
      lista.forEach(a=>{
        const row=document.createElement('div');row.className='atrib-item';
        row.innerHTML=`<div class="atrib-left"><div class="atrib-dot" style="background:${a.cor||'#4ca8d8'}"></div><span class="atrib-nome">${a.nome||'—'}</span></div>
          <button class="btn-rm-atrib" title="Remover" onclick="removerAtrib('${obra.id}','${a.profile_id}')">×</button>`;
        atribList.appendChild(row);
      });
    }
    renderAtribList(atribuicoes||[]);
    sec.appendChild(atribList);

    // add atribuição
    const addRow=document.createElement('div');addRow.className='atrib-add-row';
    const sel=document.createElement('select');sel.className='atrib-sel';
    sel.innerHTML='<option value="">Adicionar perfil...</option>';
    (todosProfiles||[]).filter(p=>!(atribuicoes||[]).some(a=>a.profile_id===p.id)).forEach(p=>{
      const opt=document.createElement('option');opt.value=p.id;opt.textContent=p.nome;sel.appendChild(opt);
    });
    const btnAdd=document.createElement('button');btnAdd.className='btn-save';btnAdd.textContent='Atribuir';
    btnAdd.style.cssText='padding:8px 14px;font-size:12px';
    btnAdd.addEventListener('click',async()=>{
      const pid=sel.value;if(!pid)return;
      const pData=todosProfiles.find(p=>p.id===pid);
      await sb.from('obra_atribuicoes').insert({obra_id:obra.id,profile_id:pid});
      atribuicoes.push({profile_id:pid,nome:pData?.nome,cor:pData?.cor||'#4ca8d8'});
      renderAtribList(atribuicoes);
      const opt=sel.querySelector(`option[value="${pid}"]`);if(opt)opt.remove();
      toast('Perfil atribuído','ok');renderBoard();
    });
    addRow.appendChild(sel);addRow.appendChild(btnAdd);
    sec.appendChild(addRow);
    body.appendChild(sec);

    const div=document.createElement('div');div.style.borderTop='1px solid var(--border)';div.style.marginBottom='4px';
    body.appendChild(div);
  }

  window.removerAtrib=async(obraId,profileId)=>{
    await sb.from('obra_atribuicoes').delete().eq('obra_id',obraId).eq('profile_id',profileId);
    const idx=atribuicoes.findIndex(a=>a.profile_id===profileId);
    if(idx>-1)atribuicoes.splice(idx,1);
    document.getElementById('atrib-list-'+obraId)&&renderBoard();
    toast('Perfil removido','ok');closeOv('ov-detalhe');renderBoard();
  };

  // SEÇÃO: CHECKLISTS
  const ckSec=document.createElement('div');ckSec.className='detalhe-section';
  ckSec.innerHTML='<div class="detalhe-section-title">Etapas da obra</div>';

  (etapas||[]).forEach(etapa=>{
    const items=(cl||[]).filter(c=>c.acomp_checklist_template?.etapa_id===etapa.id)
      .sort((a,b)=>(a.acomp_checklist_template?.ordem||0)-(b.acomp_checklist_template?.ordem||0));
    const total=items.length,done=items.filter(i=>i.concluido).length;
    const pct=total?Math.round((done/total)*100):0;
    const bloq=bloqMap[etapa.id];
    const euBloqueei=bloq&&bloq.profile_id===ME?.id;
    const outroBloqueou=bloq&&!euBloqueei;
    const etapaBloqueadaParaMim=outroBloqueou&&PERFIL!=='gestor';

    const bloco=document.createElement('div');bloco.className='etapa-bloco';
    const head=document.createElement('div');head.className='etapa-header';

    let lockHTML='';
    if(bloq){
      const lockColor=bloq.cor||'#4ca8d8';
      lockHTML=`<span class="etapa-lock" style="background:${lockColor}22;color:${lockColor}">`+
        `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`+
        `${bloq.nome}</span>`;
    }

    head.innerHTML=`<span class="etapa-nome">${etapa.numero}. ${etapa.nome}</span>
      <div class="etapa-right">
        ${lockHTML}
        <span class="etapa-pct" id="ep-${etapa.id}">${done}/${total} — ${pct}%</span>
        <span class="etapa-chev aberto">▾</span>
      </div>`;

    const barWrap=document.createElement('div');barWrap.className='etapa-bar';
    const bf=document.createElement('div');
    bf.className='etapa-bar-fill'+(pct===100?' ok':'');
    bf.style.width=pct+'%';bf.id='eb-'+etapa.id;
    if(bloq)bf.style.background=bloq.cor||'var(--blue)';
    barWrap.appendChild(bf);

    const list=document.createElement('div');list.className='checklist';

    if(!items.length){
      list.innerHTML='<span style="font-size:12px;color:var(--text3)">Nenhum item.</span>';
    } else {
      items.forEach(item=>{
        const tmpl=item.acomp_checklist_template;
        const row=document.createElement('div');row.className='ck-row';
        const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!item.concluido;cb.id='ck-'+item.id;
        // desabilita se bloqueado por outro
        if(etapaBloqueadaParaMim)cb.disabled=true;
        const lbl=document.createElement('label');lbl.className='ck-lbl'+(item.concluido?' feito':'');lbl.htmlFor='ck-'+item.id;
        lbl.textContent=tmpl?.item||'—';
        row.appendChild(cb);row.appendChild(lbl);

        cb.addEventListener('change',async()=>{
          if(etapaBloqueadaParaMim){cb.checked=!cb.checked;return;}
          const v=cb.checked;
          lbl.classList.toggle('feito',v);
          await sb.from('acomp_obra_checklist').update({concluido:v,concluido_em:v?new Date().toISOString():null}).eq('id',item.id);

          // registrar histórico
          await sb.from('checklist_historico').insert({
            obra_id:obra.id,etapa_id:etapa.id,obra_checklist_id:item.id,
            profile_id:ME.id,profile_nome:document.getElementById('sb-nome').textContent,
            profile_cor:ME_COR,acao:v?'marcado':'desmarcado'
          });

          // criar bloqueio se ainda não existir (primeiro a marcar)
          if(v&&!bloqMap[etapa.id]){
            const nome=document.getElementById('sb-nome').textContent;
            await sb.from('etapa_bloqueios').insert({
              obra_id:obra.id,etapa_id:etapa.id,
              profile_id:ME.id,profile_nome:nome,profile_cor:ME_COR
            });
            bloqMap[etapa.id]={profile_id:ME.id,nome,cor:ME_COR};
            // atualiza visual da etapa
            head.querySelector('.etapa-right').insertAdjacentHTML('afterbegin',
              `<span class="etapa-lock" style="background:${ME_COR}22;color:${ME_COR}">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>${nome}</span>`
            );
          }

          // atualiza barras
          const newDone=list.querySelectorAll('input:checked').length;
          const newPct=Math.round((newDone/total)*100);
          document.getElementById('eb-'+etapa.id).style.width=newPct+'%';
          document.getElementById('eb-'+etapa.id).className='etapa-bar-fill'+(newPct===100?' ok':'');
          document.getElementById('ep-'+etapa.id).textContent=`${newDone}/${total} — ${newPct}%`;
          atualizarBarraCard(obra.id);
          toast(v?'✓ Marcado':'Desmarcado','ok');
        });
        list.appendChild(row);
      });
    }

    head.addEventListener('click',()=>{list.classList.toggle('fechado');head.querySelector('.etapa-chev').classList.toggle('aberto');});
    bloco.appendChild(head);bloco.appendChild(barWrap);bloco.appendChild(list);
    ckSec.appendChild(bloco);
  });
  body.appendChild(ckSec);

  // SEÇÃO: HISTÓRICO
  const histSec=document.createElement('div');histSec.className='detalhe-section';
  histSec.style.borderTop='1px solid var(--border)';histSec.style.paddingTop='14px';histSec.style.marginTop='4px';
  histSec.innerHTML='<div class="detalhe-section-title">Histórico</div>';
  const histList=document.createElement('div');histList.className='hist-list';
  if(!(historico||[]).length){
    histList.innerHTML='<span style="font-size:12px;color:var(--text3)">Nenhum registro ainda.</span>';
  } else {
    (historico||[]).forEach(h=>{
      const etapaNome=(etapas||[]).find(e=>e.id===h.etapa_id)?.nome||'Etapa';
      const dt=new Date(h.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const item=document.createElement('div');item.className='hist-item';
      item.innerHTML=`<div class="hist-dot" style="background:${h.profile_cor||'#4ca8d8'}"></div>
        <div class="hist-content">
          <div class="hist-acao"><span style="color:${h.profile_cor||'#4ca8d8'}">${h.profile_nome||'—'}</span> ${h.acao==='marcado'?'marcou':'desmarcou'} item em <strong>${etapaNome}</strong></div>
          <div class="hist-sub">${dt}</div>
        </div>`;
      histList.appendChild(item);
    });
  }
  histSec.appendChild(histList);body.appendChild(histSec);

  // MOVER
  const moverSec=document.createElement('div');moverSec.className='mover-sec';
  moverSec.innerHTML=`<div class="mover-title">Mover para coluna</div>
    <div class="mover-row">
      <select class="m-sel" id="m-sel">
        <option value="em_andamento">Em andamento</option><option value="seg">Segunda</option>
        <option value="ter">Terça</option><option value="qua">Quarta</option>
        <option value="qui">Quinta</option><option value="sex">Sexta</option>
        <option value="revisao">Revisão</option>
      </select>
      <button class="btn-mover" id="btn-mover">Mover</button>
      <button class="btn-concluir" id="btn-concluir">✓ Concluir</button>
    </div>`;
  body.appendChild(moverSec);
  if(obra.status_coluna!=='concluido')document.getElementById('m-sel').value=obra.status_coluna;
  document.getElementById('btn-mover').onclick=async()=>{
    const v=document.getElementById('m-sel').value;
    await sb.from('acomp_obras').update({status_coluna:v}).eq('id',OBRA_ID);
    closeOv('ov-detalhe');toast('Obra movida','ok');renderBoard();
  };
  document.getElementById('btn-concluir').onclick=async()=>{
    if(!confirm('Marcar como concluída?'))return;
    await sb.from('acomp_obras').update({status_coluna:'concluido'}).eq('id',OBRA_ID);
    closeOv('ov-detalhe');toast('Obra concluída!','ok');renderBoard();
  };
}

async function loadUsuarios(){
  const{data}=await sb.from('profiles').select('*').order('criado_em');
  const tb=document.getElementById('usuarios-tbody');
  if(!data?.length){tb.innerHTML='<tr><td colspan="4" class="loading-txt">Nenhum usuário</td></tr>';return;}
  tb.innerHTML=data.map(u=>`<tr>
    <td><div style="width:16px;height:16px;border-radius:50%;background:${u.cor||'#4ca8d8'}"></div></td>
    <td>${u.nome}</td>
    <td><span class="badge ${u.perfil}">${u.perfil}</span></td>
    <td style="color:var(--text2)">${new Date(u.criado_em).toLocaleDateString('pt-BR')}</td>
  </tr>`).join('');
}
document.getElementById('btn-novo-usuario').addEventListener('click',()=>{
  renderColorPicker('u-color-picker','u-cor','#4ca8d8');
  openOv('ov-usuario');
});
document.getElementById('btn-salvar-usuario').addEventListener('click',async()=>{
  const nome=document.getElementById('u-nome').value.trim();
  const email=document.getElementById('u-email').value.trim();
  const senha=document.getElementById('u-senha').value;
  const perfil=document.getElementById('u-perfil').value;
  const cor=document.getElementById('u-cor').value||'#4ca8d8';
  if(!nome||!email||!senha){toast('Preencha todos os campos','err');return;}
  if(senha.length<6){toast('Senha mínimo 6 caracteres','err');return;}
  const{data,error}=await sb.auth.signUp({email,password:senha});
  if(error){toast('Erro: '+error.message,'err');return;}
  if(data.user)await sb.from('profiles').insert({id:data.user.id,nome,perfil,cor});
  ['u-nome','u-email','u-senha'].forEach(id=>document.getElementById(id).value='');
  closeOv('ov-usuario');toast('Usuário criado!','ok');loadUsuarios();
});

// HELPERS
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2600);}
</script>
</body>
</html>
